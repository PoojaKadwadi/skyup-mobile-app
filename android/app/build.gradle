apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

project.ext {
    hermesEnabled = true
}
apply plugin: "com.google.gms.google-services"

def enableProguardInReleaseBuilds = true

android {
    buildToolsVersion "34.0.0"
    compileSdk 35
    namespace "com.skyupcrm"
    defaultConfig {
        applicationId "com.skyupcrm"
        minSdkVersion 24
        targetSdkVersion 35
        versionCode 1
        versionName "1.0"
    }

    splits {
        abi {
            enable true
            reset()
            include "armeabi-v7a", "arm64-v8a"
            universalApk false
        }
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            storeFile file(MYAPP_RELEASE_STORE_FILE)
            storePassword MYAPP_RELEASE_STORE_PASSWORD
            keyAlias MYAPP_RELEASE_KEY_ALIAS
            keyPassword MYAPP_RELEASE_KEY_PASSWORD
        }
    }

    buildTypes {
        debug { signingConfig signingConfigs.debug }
        release {
            signingConfig signingConfigs.release
            minifyEnabled enableProguardInReleaseBuilds
            shrinkResources enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }

    applicationVariants.all { variant ->
        variant.outputs.each { output ->
            def abiCodes = ["armeabi-v7a": 1, "arm64-v8a": 2]
            def abi = output.getFilter(com.android.build.OutputFile.ABI)
            if (abi != null) {
                output.versionCodeOverride = abiCodes.get(abi) * 1000 + variant.versionCode
            }
        }
    }
}

dependencies {
    implementation("com.facebook.react:react-android")
    implementation("com.facebook.react:hermes-android")

    // ✅ Firebase BOM — controls all Firebase library versions together
    implementation(platform("com.google.firebase:firebase-bom:33.1.0"))

    // ✅ Firebase Messaging (FCM) — required for push notifications
    implementation("com.google.firebase:firebase-messaging")

    // ✅ Firebase Analytics — required for Firebase to initialize properly
    implementation("com.google.firebase:firebase-analytics")
}

apply from: file("../../node_modules/@react-native-community/cli-platform-android/native_modules.gradle")
applyNativeModulesAppBuildGradle(project)

android.sourceSets.main.java.srcDirs += [
    "build/generated/rncli/src/main/java"
]

apply from: file("../../node_modules/react-native-vector-icons/fonts.gradle")
